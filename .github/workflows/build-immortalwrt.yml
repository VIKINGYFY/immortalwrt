name: Build ImmortalWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          ref: owrt

      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3 python3-pip python3-setuptools rsync unzip zlib1g-dev \
            file wget curl llvm npm

      - name: Setup Feeds and Custom Packages
        run: |
          # 添加 kenzok8 软件源
          sed -i '1i src-git kenzo https://github.com/kenzok8/openwrt-packages' feeds.conf.default
          sed -i '2i src-git small https://github.com/kenzok8/small' feeds.conf.default

          # 更新 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 添加 mosdns（清理原版冲突）
          find ./ | grep Makefile | grep v2ray-geodata | xargs rm -f
          find ./ | grep Makefile | grep mosdns | xargs rm -f
          git clone https://github.com/sbwml/luci-app-mosdns -b v5 package/mosdns
          git clone https://github.com/sbwml/v2ray-geodata package/v2ray-geodata

          # 添加 luci-app-daed
          git clone https://github.com/QiuSimons/luci-app-daed package/dae

          # 添加 turboacc
          curl -sSL https://raw.githubusercontent.com/mufeng05/turboacc/main/add_turboacc.sh -o add_turboacc.sh && bash add_turboacc.sh

          # 再次更新 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Custom Config
        run: |
          # 使用你上传的 s20m.config
          if [ -f "s20m.config" ]; then
            echo "✅ 使用 s20m.config 作为编译配置"
            cp s20m.config .config
          else
            echo "⚠️ 未找到 s20m.config，使用默认配置"
            make defconfig
          fi
          make defconfig

      - name: Download Packages
        run: |
          make download -j$(nproc) || true

      - name: Compile Firmware
        run: |
          # 建议第一次编译用单线程，稳定
          make -j1 V=s

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-S20M-Firmware
          path: |
            bin/targets/*
          retention-days: 30
